openapi: 3.1.0
info:
  title: F2B Sandbox API
  description: |
    灵境云 AI 沙箱产品 API（f2b-sandbox）。
    浏览器应经 f2b-web BFF；SDK 直连时使用 API Key（F2B_AUTH_MODE=api_key）。
  version: 0.1.0
  license:
    name: Apache-2.0
servers:
  - url: http://localhost:8787
    description: local f2b-sandbox
paths:
  /v1/api-keys:
    get:
      operationId: listApiKeys
      summary: 列出 API Key（无明文）
      security: [{ AdminToken: [] }]
      responses:
        "200":
          description: OK
    post:
      operationId: createApiKey
      summary: 创建 API Key（secret 仅返回一次）
      security: [{ AdminToken: [] }]
      responses:
        "201":
          description: Created with secret once
  /v1/api-keys/{id}:
    delete:
      operationId: revokeApiKey
      summary: 吊销 API Key
      security: [{ AdminToken: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Revoked
  /v1/sandboxes:
    get:
      operationId: listSandboxes
      summary: 列出沙箱
      parameters:
        - name: projectId
          in: query
          schema: { type: string }
        - name: status
          in: query
          description: 按状态过滤；逗号分隔多状态，如 running,paused
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sandboxes:
                    type: array
                    items: { $ref: "#/components/schemas/SandboxRecord" }
    post:
      operationId: createSandbox
      summary: 创建沙箱
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSandbox" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  sandbox: { $ref: "#/components/schemas/SandboxRecord" }
  /v1/sandboxes/{id}:
    get:
      operationId: getSandbox
      parameters:
        - $ref: "#/components/parameters/SandboxId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sandbox: { $ref: "#/components/schemas/SandboxRecord" }
    patch:
      operationId: updateSandbox
      summary: 更新沙箱（延期 timeoutMs / 合并 metadata）
      parameters:
        - $ref: "#/components/parameters/SandboxId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateSandbox" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  sandbox: { $ref: "#/components/schemas/SandboxRecord" }
    delete:
      operationId: killSandbox
      parameters:
        - $ref: "#/components/parameters/SandboxId"
      responses:
        "200":
          description: Killed
          content:
            application/json:
              schema:
                type: object
                properties:
                  sandbox: { $ref: "#/components/schemas/SandboxRecord" }
  /v1/sandboxes/{id}/pause:
    post:
      operationId: pauseSandbox
      summary: 暂停沙箱（fake 支持；Cube 视集群）
      parameters:
        - $ref: "#/components/parameters/SandboxId"
      responses:
        "200":
          description: Paused
          content:
            application/json:
              schema:
                type: object
                properties:
                  sandbox: { $ref: "#/components/schemas/SandboxRecord" }
  /v1/sandboxes/{id}/resume:
    post:
      operationId: resumeSandbox
      summary: 恢复已暂停沙箱
      parameters:
        - $ref: "#/components/parameters/SandboxId"
      responses:
        "200":
          description: Running
          content:
            application/json:
              schema:
                type: object
                properties:
                  sandbox: { $ref: "#/components/schemas/SandboxRecord" }
  /v1/sandboxes/{id}/commands:
    post:
      operationId: runCommand
      parameters:
        - $ref: "#/components/parameters/SandboxId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RunCommand" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  result: { $ref: "#/components/schemas/CommandResult" }
  /v1/sandboxes/{id}/commands/stream:
    post:
      operationId: runCommandStream
      summary: 流式执行命令（SSE）
      description: |
        `text/event-stream`。事件 data 为 JSON：
        `{type:"stdout"|"stderr",text}` → `{type:"result",result}`；
        失败时 `{type:"error",code,message}`。
      parameters:
        - $ref: "#/components/parameters/SandboxId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RunCommand" }
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
  /v1/sandboxes/{id}/files:
    get:
      operationId: readOrListFiles
      parameters:
        - $ref: "#/components/parameters/SandboxId"
        - name: path
          in: query
          schema: { type: string }
        - name: list
          in: query
          schema: { type: string, enum: ["1", "true"] }
        - name: encoding
          in: query
          schema: { type: string, enum: [utf8, base64], default: utf8 }
      responses:
        "200":
          description: OK
    post:
      operationId: writeFile
      parameters:
        - $ref: "#/components/parameters/SandboxId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WriteFile" }
      responses:
        "201":
          description: Written
    delete:
      operationId: deleteFile
      summary: 删除沙箱内文件或目录
      parameters:
        - $ref: "#/components/parameters/SandboxId"
        - name: path
          in: query
          required: true
          schema: { type: string }
        - name: recursive
          in: query
          schema: { type: string, enum: ["1", "true"] }
          description: 删除目录时是否递归
      responses:
        "200":
          description: Deleted
        "404":
          description: Not found
  /v1/sandboxes/{id}/files/mkdir:
    post:
      operationId: mkdir
      summary: 创建目录
      parameters:
        - $ref: "#/components/parameters/SandboxId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Mkdir" }
      responses:
        "201":
          description: Created
  /v1/sandboxes/{id}/files/rename:
    post:
      operationId: renameFile
      summary: 重命名或移动文件/目录
      parameters:
        - $ref: "#/components/parameters/SandboxId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RenameFile" }
      responses:
        "200":
          description: Renamed
        "404":
          description: Source not found
  /v1/usage:
    get:
      operationId: getUsage
      summary: 近 N 日用量聚合（UTC 日）
      parameters:
        - name: days
          in: query
          description: 回溯天数，1–90，默认 7
          schema: { type: integer, minimum: 1, maximum: 90, default: 7 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [usage]
                properties:
                  usage: { $ref: "#/components/schemas/UsageSummary" }
  /v1/templates:
    get:
      operationId: listTemplates
      summary: 预置模板目录
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [templates]
                properties:
                  templates:
                    type: array
                    items: { $ref: "#/components/schemas/TemplateRef" }
  /healthz:
    get:
      operationId: healthz
      responses:
        "200":
          description: OK
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "API Key sk_live_… (Authorization Bearer)"
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
    AdminToken:
      type: apiKey
      in: header
      name: X-F2B-Admin-Token

  parameters:
    SandboxId:
      name: id
      in: path
      required: true
      schema: { type: string }
  schemas:
    CreateSandbox:
      type: object
      properties:
        name: { type: string }
        template: { type: string, default: base }
        timeoutMs: { type: integer }
        allowInternetAccess: { type: boolean, default: false }
        projectId: { type: string, default: default }
        metadata:
          type: object
          additionalProperties: { type: string }
    UpdateSandbox:
      type: object
      description: 至少提供 timeoutMs 或 metadata 之一
      properties:
        timeoutMs:
          type: integer
          nullable: true
          description: 空闲超时窗口（ms）；null 取消。设置非 null 时刷新 lastActiveAt
        metadata:
          type: object
          additionalProperties: { type: string }
          description: 浅合并进现有 metadata
    SandboxRecord:
      type: object
      required: [id, name, template, status, projectId, backend]
      properties:
        id: { type: string }
        name: { type: string }
        template: { type: string }
        status:
          type: string
          enum: [provisioning, running, paused, succeeded, failed, killed]
        projectId: { type: string }
        backend:
          type: string
          enum: [fake, cube]
        remoteId: { type: string, nullable: true }
        allowInternetAccess: { type: boolean }
        timeoutMs: { type: integer, nullable: true }
        region: { type: string }
        cpu: { type: string }
        memory: { type: string }
        error: { type: string, nullable: true }
        metadata:
          type: object
          additionalProperties: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        startedAt: { type: string, format: date-time, nullable: true }
        lastActiveAt:
          type: string
          format: date-time
          nullable: true
          description: 最近活动时间；超时 = lastActiveAt + timeoutMs
        finishedAt: { type: string, format: date-time, nullable: true }
        durationSec: { type: integer }
    RunCommand:
      type: object
      required: [cmd]
      properties:
        cmd: { type: string }
        cwd: { type: string }
        timeoutMs: { type: integer }
        env:
          type: object
          additionalProperties: { type: string }
    CommandResult:
      type: object
      properties:
        exitCode: { type: integer }
        stdout: { type: string }
        stderr: { type: string }
        durationMs: { type: integer }
    WriteFile:
      type: object
      required: [path, content]
      properties:
        path: { type: string }
        content: { type: string }
        encoding: { type: string, enum: [utf8, base64], default: utf8 }
    Mkdir:
      type: object
      required: [path]
      properties:
        path: { type: string }
        recursive: { type: boolean, default: true }
    RenameFile:
      type: object
      required: [from, to]
      properties:
        from: { type: string }
        to: { type: string }
    UsageDayBucket:
      type: object
      required: [day, sandboxHours, commands, durationMs]
      properties:
        day: { type: string, description: "UTC date YYYY-MM-DD" }
        sandboxHours: { type: number }
        commands: { type: integer }
        durationMs: { type: number }
    UsageSummary:
      type: object
      required: [days, totalDurationMs, totalSandboxHours, totalCommands, byDay]
      properties:
        days: { type: integer }
        totalDurationMs: { type: number }
        totalSandboxHours: { type: number }
        totalCommands: { type: integer }
        byDay:
          type: array
          items: { $ref: "#/components/schemas/UsageDayBucket" }
    TemplateRef:
      type: object
      required: [id, name, description]
      properties:
        id: { type: string, description: "创建沙箱时 template 字段" }
        name: { type: string }
        description: { type: string }
        image: { type: string }
        tags:
          type: array
          items: { type: string }
        popular: { type: boolean }
    ApiError:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details: {}
