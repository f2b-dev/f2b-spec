openapi: 3.1.0
info:
  title: F2B Sandbox API
  description: |
    灵境云 AI 沙箱产品 API（f2b-sandbox）。
    浏览器应经 f2b-web BFF；SDK 直连时使用 API Key（F2B_AUTH_MODE=api_key）。
  version: 0.1.0
  license:
    name: Apache-2.0
servers:
  - url: http://localhost:8787
    description: local f2b-sandbox
paths:
  /v1/api-keys:
    get:
      operationId: listApiKeys
      summary: 列出 API Key（无明文）
      security: [{ AdminToken: [] }]
      responses:
        "200":
          description: OK
    post:
      operationId: createApiKey
      summary: 创建 API Key（secret 仅返回一次）
      security: [{ AdminToken: [] }]
      responses:
        "201":
          description: Created with secret once
  /v1/api-keys/{id}:
    delete:
      operationId: revokeApiKey
      summary: 吊销 API Key
      security: [{ AdminToken: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Revoked
  /v1/sandboxes:
    get:
      operationId: listSandboxes
      summary: 列出沙箱
      parameters:
        - name: projectId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sandboxes:
                    type: array
                    items: { $ref: "#/components/schemas/SandboxRecord" }
    post:
      operationId: createSandbox
      summary: 创建沙箱
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSandbox" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  sandbox: { $ref: "#/components/schemas/SandboxRecord" }
  /v1/sandboxes/{id}:
    get:
      operationId: getSandbox
      parameters:
        - $ref: "#/components/parameters/SandboxId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sandbox: { $ref: "#/components/schemas/SandboxRecord" }
    delete:
      operationId: killSandbox
      parameters:
        - $ref: "#/components/parameters/SandboxId"
      responses:
        "200":
          description: Killed
          content:
            application/json:
              schema:
                type: object
                properties:
                  sandbox: { $ref: "#/components/schemas/SandboxRecord" }
  /v1/sandboxes/{id}/commands:
    post:
      operationId: runCommand
      parameters:
        - $ref: "#/components/parameters/SandboxId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RunCommand" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  result: { $ref: "#/components/schemas/CommandResult" }
  /v1/sandboxes/{id}/commands/stream:
    post:
      operationId: runCommandStream
      summary: 流式执行命令（SSE）
      description: |
        `text/event-stream`。事件 data 为 JSON：
        `{type:"stdout"|"stderr",text}` → `{type:"result",result}`；
        失败时 `{type:"error",code,message}`。
      parameters:
        - $ref: "#/components/parameters/SandboxId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RunCommand" }
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
  /v1/sandboxes/{id}/files:
    get:
      operationId: readOrListFiles
      parameters:
        - $ref: "#/components/parameters/SandboxId"
        - name: path
          in: query
          schema: { type: string }
        - name: list
          in: query
          schema: { type: string, enum: ["1", "true"] }
        - name: encoding
          in: query
          schema: { type: string, enum: [utf8, base64], default: utf8 }
      responses:
        "200":
          description: OK
    post:
      operationId: writeFile
      parameters:
        - $ref: "#/components/parameters/SandboxId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WriteFile" }
      responses:
        "201":
          description: Written
  /v1/usage:
    get:
      operationId: getUsage
      summary: 近 N 日用量聚合（UTC 日）
      parameters:
        - name: days
          in: query
          description: 回溯天数，1–90，默认 7
          schema: { type: integer, minimum: 1, maximum: 90, default: 7 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [usage]
                properties:
                  usage: { $ref: "#/components/schemas/UsageSummary" }
  /healthz:
    get:
      operationId: healthz
      responses:
        "200":
          description: OK
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "API Key sk_live_… (Authorization Bearer)"
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
    AdminToken:
      type: apiKey
      in: header
      name: X-F2B-Admin-Token

  parameters:
    SandboxId:
      name: id
      in: path
      required: true
      schema: { type: string }
  schemas:
    CreateSandbox:
      type: object
      properties:
        name: { type: string }
        template: { type: string, default: base }
        timeoutMs: { type: integer }
        allowInternetAccess: { type: boolean, default: false }
        projectId: { type: string, default: default }
        metadata:
          type: object
          additionalProperties: { type: string }
    SandboxRecord:
      type: object
      required: [id, name, template, status, projectId, backend]
      properties:
        id: { type: string }
        name: { type: string }
        template: { type: string }
        status:
          type: string
          enum: [provisioning, running, paused, succeeded, failed, killed]
        projectId: { type: string }
        backend:
          type: string
          enum: [fake, cube]
        remoteId: { type: string, nullable: true }
        allowInternetAccess: { type: boolean }
        timeoutMs: { type: integer, nullable: true }
        region: { type: string }
        cpu: { type: string }
        memory: { type: string }
        error: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        startedAt: { type: string, format: date-time, nullable: true }
        finishedAt: { type: string, format: date-time, nullable: true }
        durationSec: { type: integer }
    RunCommand:
      type: object
      required: [cmd]
      properties:
        cmd: { type: string }
        cwd: { type: string }
        timeoutMs: { type: integer }
        env:
          type: object
          additionalProperties: { type: string }
    CommandResult:
      type: object
      properties:
        exitCode: { type: integer }
        stdout: { type: string }
        stderr: { type: string }
        durationMs: { type: integer }
    WriteFile:
      type: object
      required: [path, content]
      properties:
        path: { type: string }
        content: { type: string }
        encoding: { type: string, enum: [utf8, base64], default: utf8 }
    UsageDayBucket:
      type: object
      required: [day, sandboxHours, commands, durationMs]
      properties:
        day: { type: string, description: "UTC date YYYY-MM-DD" }
        sandboxHours: { type: number }
        commands: { type: integer }
        durationMs: { type: number }
    UsageSummary:
      type: object
      required: [days, totalDurationMs, totalSandboxHours, totalCommands, byDay]
      properties:
        days: { type: integer }
        totalDurationMs: { type: number }
        totalSandboxHours: { type: number }
        totalCommands: { type: integer }
        byDay:
          type: array
          items: { $ref: "#/components/schemas/UsageDayBucket" }
    ApiError:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details: {}
